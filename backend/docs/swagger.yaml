basePath: /
definitions:
  dto.CreateReservationRequest:
    properties:
      license_plate:
        example: KAZ-789-XY
        maxLength: 15
        type: string
      zone_id:
        example: 1
        type: integer
    required:
    - license_plate
    - zone_id
    type: object
  dto.CreateZoneRequest:
    properties:
      name:
        example: Downtown A
        maxLength: 100
        minLength: 3
        type: string
      price_per_hour:
        example: 5.5
        type: number
      total_capacity:
        example: 50
        type: integer
      type:
        enum:
        - general
        - covered
        - ev_charging
        example: general
        type: string
    required:
    - name
    - price_per_hour
    - total_capacity
    - type
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: john.doe@example.com
        type: string
      password:
        example: securepassword123
        type: string
    required:
    - email
    - password
    type: object
  dto.RegisterRequest:
    properties:
      email:
        example: john.doe@example.com
        type: string
      name:
        example: John Doe
        maxLength: 100
        minLength: 3
        type: string
      password:
        example: securepassword123
        minLength: 6
        type: string
      role:
        enum:
        - driver
        - admin
        example: driver
        type: string
    required:
    - email
    - name
    - password
    type: object
  dto.UpdateZoneRequest:
    properties:
      name:
        example: Downtown A - Updated
        maxLength: 100
        minLength: 3
        type: string
      price_per_hour:
        example: 6
        type: number
      total_capacity:
        example: 60
        type: integer
      type:
        enum:
        - general
        - covered
        - ev_charging
        example: covered
        type: string
    type: object
  response.APIResponse:
    properties:
      data: {}
      errors: {}
      message:
        type: string
      success:
        type: boolean
    type: object
info:
  contact: {}
  description: This is the SpotSync API server.
  title: SpotSync API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login to SpotSync
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: Login User
      tags:
      - Authentication
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new SpotSync user
      parameters:
      - description: Register Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: Register User
      tags:
      - Authentication
  /api/v1/reservations:
    get:
      consumes:
      - application/json
      description: Get all reservations in the system (Admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: Get All Reservations
      tags:
      - Reservations
    post:
      consumes:
      - application/json
      description: Create a new parking spot reservation
      parameters:
      - description: Create Reservation Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateReservationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: Create Reservation
      tags:
      - Reservations
  /api/v1/reservations/{id}:
    delete:
      consumes:
      - application/json
      description: Cancel a reservation
      parameters:
      - description: Reservation ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: Cancel Reservation
      tags:
      - Reservations
  /api/v1/reservations/my-reservations:
    get:
      consumes:
      - application/json
      description: Get all reservations for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: Get My Reservations
      tags:
      - Reservations
  /api/v1/zones:
    get:
      consumes:
      - application/json
      description: Get all parking zones with available spots
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: Get All Parking Zones
      tags:
      - Parking Zones
    post:
      consumes:
      - application/json
      description: Create a new parking zone (Admin only)
      parameters:
      - description: Create Zone Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateZoneRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: Create Parking Zone
      tags:
      - Parking Zones
  /api/v1/zones/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a parking zone (Admin only)
      parameters:
      - description: Zone ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete Parking Zone
      tags:
      - Parking Zones
    get:
      consumes:
      - application/json
      description: Get a single parking zone by ID
      parameters:
      - description: Zone ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: Get Parking Zone
      tags:
      - Parking Zones
    put:
      consumes:
      - application/json
      description: Update a parking zone (Admin only)
      parameters:
      - description: Zone ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update Zone Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateZoneRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: Update Parking Zone
      tags:
      - Parking Zones
securityDefinitions:
  BearerAuth:
    description: Type "Bearer <your_token>" or just "<your_token>" to authenticate.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
