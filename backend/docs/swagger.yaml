  /api/v1/zones:
    get:
      consumes:
      - application/json
      description: Get all parking zones with available spots
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: Get All Parking Zones
      tags:
      - Parking Zones
