version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: spotsync_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: spotsync_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: spotsync_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password123
      DB_NAME: spotsync_db
      JWT_SECRET: your_super_secret_jwt_key_that_is_at_least_32_characters_long_12345
      PORT: 8080
      ENV: development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "go run ./cmd/main.go"
    volumes:
      - .:/app

volumes:
  postgres_data:
